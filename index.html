<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artifact Viewer</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:14px/1.5 system-ui,-apple-system,sans-serif;background:#fafafa;color:#222}
  body{display:flex;flex-direction:column}
  #toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#fff;border-bottom:1px solid #e5e5e5;min-height:44px;flex-shrink:0;flex-wrap:wrap}
  #toolbar h1{font-size:13px;margin:0;font-weight:600;color:#555;flex:1;min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #toolbar .status{font-size:11px;color:#888;flex-shrink:0;white-space:nowrap}
  #toolbar .group{display:flex;border:1px solid #d4d4d4;border-radius:4px;overflow:hidden}
  #toolbar .group button{border:0;border-right:1px solid #d4d4d4;border-radius:0;background:#f4f4f4}
  #toolbar .group button:last-child{border-right:0}
  #toolbar button{font:inherit;font-size:12px;padding:5px 10px;background:#f4f4f4;border:1px solid #d4d4d4;border-radius:4px;cursor:pointer;color:#222}
  #toolbar button:hover:not(:disabled){background:#e8e8e8}
  #toolbar button:disabled{opacity:.45;cursor:not-allowed}
  iframe{flex:1;width:100%;border:0;background:#fff;display:block;min-height:0}
  body.busy{cursor:progress}
  body.busy #toolbar button{cursor:progress}
  #toolbar .progress{position:relative;flex-shrink:0;width:100px;height:5px;background:#eee;border-radius:3px;overflow:hidden}
  #toolbar .progress[hidden]{display:none}
  #toolbar #progress-bar{height:100%;width:0;background:#3b82f6;transition:width .15s ease-out}
</style>
</head>
<body>
<header id="toolbar">
  <h1 id="title">Artifact Viewer</h1>
  <span class="status" id="status" aria-live="polite" aria-atomic="true"></span>
  <div class="progress" id="progress" hidden><div id="progress-bar"></div></div>
  <div class="group" role="group" aria-label="Export">
    <button data-export="html" disabled>HTML</button>
    <button data-export="png" disabled>PNG</button>
    <button data-export="pdf" disabled>PDF</button>
    <button data-export="pptx" disabled>PPTX</button>
  </div>
  <button id="btn-copy">Copy URL</button>
  <button id="btn-shorten" disabled>Copy Short URL</button>
</header>
<iframe id="frame" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-downloads allow-same-origin"></iframe>
<script src="dicts.js"></script>
<script src="dynamic-dict.js"></script>
<script src="sdht.js"></script>
<script src="uat-codec.js"></script>
<script src="uat-export.js"></script>
<script>
(() => {
  // ============================================================
  // 本ファイルは DOM 参照・UI 状態・描画・ペースト処理・イベント結線のみを担当する。
  //   - 圧縮・展開ロジック  → uat-codec.js  (window.UAT_CODEC)
  //   - HTML/PNG/PDF/PPTXエクスポート → uat-export.js (window.UAT_EXPORT)
  // 3 つのファイルは全て同ディレクトリにホスティングされる前提。
  // ============================================================
  const C = window.UAT_CODEC;
  if (!C) {
    console.error('[url-to-artifact] uat-codec.js failed to load; viewer cannot start');
    return;
  }
  const {
    compressHtml, decompressHtml,
    SHORT_URL_HASH_RE, FORMAT_BY_PREFIX,
    compressionSupported, decompressSupport,
    loadScript, URLS, loadBrotliWasm,
    extractTitle, sanitizeFilename, formatBytes
  } = C;

  const $ = (id) => document.getElementById(id);
  const frame = $('frame');
  const titleEl = $('title');
  const statusEl = $('status');
  const copyBtn = $('btn-copy');
  const shortenBtn = $('btn-shorten');
  const exportBtns = Array.from(document.querySelectorAll('[data-export]'));
  const progressEl = $('progress');
  const progressBar = $('progress-bar');

  /** 現在表示中のHTMLソース（エクスポート用に保持） */
  let currentHtml = '';

  // ============================================================
  // UI utilities
  // ============================================================
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  const baseFilename = () => sanitizeFilename(extractTitle(currentHtml) || 'artifact');

  const setStatus = (msg) => { statusEl.textContent = msg || ''; };

  /** 多段処理の進捗バー。total<=1 のときは非表示 */
  const showProgress = (current, total) => {
    if (!total || total <= 1) { progressEl.hidden = true; return; }
    progressEl.hidden = false;
    const pct = Math.max(0, Math.min(100, (current / total) * 100));
    progressBar.style.width = pct + '%';
  };
  const hideProgress = () => { progressEl.hidden = true; progressBar.style.width = '0'; };

  /** busy=true で全ボタン無効、false で復帰（エクスポート系・Copy Short URL はアーティファクト未ロード時は無効のまま） */
  const setBusy = (busy) => {
    document.body.classList.toggle('busy', !!busy);
    const hasArtifact = !!currentHtml;
    exportBtns.forEach(b => { b.disabled = busy || !hasArtifact; });
    copyBtn.disabled = !!busy;
    // CompressionStream 非対応の古いブラウザでも LZMA-JS だけで動作可能なため、ここでは弾かない。
    // 全形式が失敗した場合のみ compressHtml が throw してエラー表示になる。
    shortenBtn.disabled = !!busy || !hasArtifact;
    if (!busy) hideProgress();
  };

  const downloadBlob = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  };

  const canvasToBlob = (canvas, type) => new Promise((res, rej) => {
    canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob returned null')), type);
  });

  // ============================================================
  // Exporters (uat-export.js から取得)
  // ============================================================
  const E = window.UAT_EXPORT;
  if (!E || typeof E.init !== 'function') {
    console.error('[url-to-artifact] uat-export.js failed to load; export buttons disabled');
  }
  const exportCtx = E && E.init({
    frame,
    getCurrentHtml: () => currentHtml,
    setStatus, setBusy, showProgress,
    baseFilename, downloadBlob, canvasToBlob
  });
  const exporters = (exportCtx && exportCtx.exporters) || {};

  // ============================================================
  // Paste-to-shorten flow
  //   空状態画面の <textarea> から呼ばれる。アドレスバーに貼ると URI Too Long に
  //   なるほど長いURLや、生HTMLをその場で圧縮して短縮URLとして開く。
  //   外部送信は一切なし (compressHtml の中で CompressionStream / brotli-wasm /
  //   LZMA-JS を使う既存パスをそのまま流用)。
  // 受理する入力:
  //   1. https?://.../#<生HTML>             → URLを parse し、hash を decodeHashHtml して圧縮
  //   2. https?://.../#<圧縮済プレフィックス>=...  → 復号して再圧縮、短くなれば置換 (劣化はしない)
  //   3. #<生HTML> または #<prefix>=<payload>  → 1/2 と同様
  //   4. それ以外の文字列                     → 生HTML として圧縮
  //
  // (2) の再圧縮について: 古い辞書バージョン (V0/V5) で生成された URL や、当時無効だった
  //   V6/V7 が今なら効くケースで数十%短くできることがある。再圧縮しても短くならなかった
  //   場合は元のhashをそのまま採用するため、劣化は起きない。展開不可形式 (zstd 非対応ブラウザ等)
  //   は再評価をスキップしてそのまま開く。
  // ============================================================
  window.uatProcessPaste = async (input) => {
    if (!input || typeof input !== 'string') throw new Error('入力が文字列ではありません');
    const trimmed = input.trim();
    if (!trimmed) throw new Error('入力が空です');

    // URL parse を試みる。成功したら fragment を抽出、さもなくば # プリフィックスをチェック、
    // どちらでもなければ生HTML扱いとする。
    let hashPart = null;
    let urlObj = null;
    try { urlObj = new URL(trimmed); } catch (e) { /* not a URL */ }
    if (urlObj) {
      hashPart = urlObj.hash ? urlObj.hash.slice(1) : '';
      if (!hashPart) {
        // 一部のクリップボード / フォーラム / メーラー等が URL 中の `#` を `%23` にエスケープしてしまう。
        // URL parse 後の hash が空でも、入力文字列中に `%23` があれば最初の `%23` 以降を
        // hash として再解釈する。スキーム付き URL として parse できている時点で、
        // path/query 中の `%23` はフラグメント区切りのエスケープと見なすのが自然。
        // ただし、`?token=abc%23def` のように単に query 文字列に %23 が含まれているだけ
        // のケースで誤って recover すると、意味のない文字列を HTML 扱いして圧縮してしまうため、
        // recover 候補を「短縮 URL らしい」または「HTML らしい (`<` または `%3C` 始まり)」場合に限定する。
        // render() 側の %23 リカバリと同じフィルタ条件で揃えることで、アドレスバー直接訪問と
        // ペースト UI のどちらからも同じルールでコンテンツを拾える。
        const idx = trimmed.search(/%23/i);
        if (idx >= 0) {
          const recovered = trimmed.slice(idx + 3);
          if (SHORT_URL_HASH_RE.test(recovered) || /^(<|%3[Cc])/.test(recovered)) {
            hashPart = recovered;
          } else {
            throw new Error('URL に # (または %23) 以降の有効なコンテンツがありません');
          }
        } else {
          throw new Error('URL に # (または %23) 以降のコンテンツがありません');
        }
      }
    } else if (trimmed.charAt(0) === '#') {
      hashPart = trimmed.slice(1);
    } else if (/^%23/i.test(trimmed)) {
      // URL として parse できないが先頭が `%23` のケース。hash 文字列だけ貼られてエスケープされたものと見なす。
      hashPart = trimmed.slice(3);
    }

    let html;
    let originalHashContent = null; // 既存の短縮URLが渡された場合: 再圧縮で短くならなければこれをそのまま採用
    if (hashPart !== null) {
      if (SHORT_URL_HASH_RE.test(hashPart)) {
        // 既存の短縮URL → 復号して再圧縮、短くなれば置換
        setBusy(true);
        setStatus('decompressing existing short URL...');
        const m = hashPart.match(SHORT_URL_HASH_RE);
        const cdv = m[1] ? parseInt(m[1], 10) : 0;
        const prefixChar = m[2];
        const fmt = FORMAT_BY_PREFIX[prefixChar];
        const dictApplied = (prefixChar === prefixChar.toUpperCase());
        const payload = m[3];
        // ブラウザ側で展開できない形式 (zstd 非対応の Chrome 等) は再評価できないので
        // そのまま開く。再圧縮しないだけで URL の解釈は render() 側で行うため動作には影響しない。
        const isStreamFmt = (fmt !== 'lzma');
        const hasFallbackDecompress = (fmt === 'brotli');
        if (isStreamFmt && !hasFallbackDecompress && (!compressionSupported || !decompressSupport[fmt])) {
          setStatus('opening short URL (cannot re-evaluate on this browser)...');
          if (location.hash === '#' + hashPart) render();
          else location.hash = '#' + hashPart;
          return;
        }
        try {
          html = await decompressHtml(fmt, payload, dictApplied, cdv);
        } catch (e) {
          setBusy(false);
          setStatus('decompress failed: ' + (e && e.message ? e.message : e));
          throw e;
        }
        originalHashContent = hashPart;
      } else {
        html = decodeHashHtml(hashPart);
      }
    } else {
      html = trimmed; // URLでも # でもない → 生HTML 扱い
    }
    if (!html) throw new Error('内容が空です');

    setBusy(true);
    setStatus(originalHashContent ? 're-compressing for potential improvement...' : 'compressing pasted content...');
    try {
      const result = await compressHtml(html);
      const newHashContent = result.prefix + '=' + result.payload;
      // 既存の短縮URLが渡された場合のみ「短くなったかどうか」を判定する。
      // 同等以下なら元のhashをそのまま採用 (劣化を防ぐ)。生HTMLからの圧縮には比較対象がない
      // のでそのまま new を採用する。
      let finalHash;
      if (originalHashContent && originalHashContent.length <= newHashContent.length) {
        finalHash = '#' + originalHashContent;
        console.info('[url-to-artifact] re-compress did not improve: kept original ('
          + originalHashContent.length + ' chars; re-compress would be '
          + newHashContent.length + ')');
      } else {
        finalHash = '#' + newHashContent;
        if (originalHashContent) {
          const saved = originalHashContent.length - newHashContent.length;
          const pct = (saved / originalHashContent.length * 100).toFixed(1);
          console.info('[url-to-artifact] re-compress saved ' + saved + ' chars ('
            + pct + '%; ' + originalHashContent.length + '→' + newHashContent.length + ')');
        }
      }
      if (location.hash === finalHash) {
        render();
      } else {
        location.hash = finalHash;
      }
    } catch (e) {
      setBusy(false);
      setStatus('shorten failed: ' + (e && e.message ? e.message : e));
      throw e; // iframe 側でエラー表示させるため re-throw
    }
  };

  // ============================================================
  // Renderers (iframe srcdoc 内容)
  // ============================================================
  const renderEmptyState = () => {
    const sample = location.origin + location.pathname + '#<h1>Hello</h1><p>本文</p>';
    return '<!doctype html><meta charset=utf-8>'
      + '<style>body{font:14px/1.6 system-ui,-apple-system,sans-serif;padding:2em;max-width:680px;margin:auto;color:#333}'
      + 'h2{font-size:1.2em;margin-top:0}'
      + 'h3{font-size:1em;margin:0 0 .5em}'
      + 'code{background:#f4f4f4;padding:.1em .4em;border-radius:3px;font-size:.9em}'
      + 'pre{background:#f4f4f4;padding:1em;border-radius:6px;overflow:auto;font-size:12px;line-height:1.4;white-space:pre-wrap;word-break:break-all}'
      + '.note{color:#666;font-size:13px;margin-top:1.5em}'
      + '.paste-zone{margin:1.5em 0;padding:1em;border:1px solid #d0d7de;border-radius:6px;background:#f6f8fa}'
      + '.paste-zone p{font-size:12px;color:#57606a;margin:.3em 0 .8em}'
      + '.paste-zone textarea{width:100%;min-height:80px;font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;box-sizing:border-box;padding:.5em;border:1px solid #d0d7de;border-radius:4px;resize:vertical;background:#fff;color:#222}'
      + '.paste-zone .row{display:flex;gap:.5em;align-items:center;margin-top:.5em;flex-wrap:wrap}'
      + '.paste-zone button{padding:.4em 1em;font:inherit;background:#0969da;color:#fff;border:0;border-radius:4px;cursor:pointer}'
      + '.paste-zone button:hover:not(:disabled){background:#0860c7}'
      + '.paste-zone button:disabled{opacity:.6;cursor:wait}'
      + '.paste-zone .err{color:#cf222e;font-size:12px}'
      + '.paste-zone .ok{color:#1a7f37;font-size:12px}</style>'
      + '<body><h2>Artifact Viewer</h2>'
      + '<p>このページのURLの <code>#</code> 以降にHTMLを書くと、ここに表示されます。</p>'
      + '<p>例:</p><pre>' + escapeHtml(sample) + '</pre>'
      + '<div class="paste-zone">'
      + '<h3>長すぎるURL / 生HTML を貼って短縮</h3>'
      + '<p>アドレスバーに貼ると <code>URI Too Long</code> になるような長いURL、または生HTMLをここに貼り付けると、その場で圧縮して短縮URLとして開けます。外部送信は一切ありません。Cmd/Ctrl+Enter で送信。</p>'
      + '<textarea id="paste-input" placeholder="https://..../url-to-artifact/#&lt;!doctype html&gt;...   または生のHTML"></textarea>'
      + '<div class="row"><button id="paste-submit">短縮して開く</button>'
      + '<span id="paste-msg"></span></div>'
      + '</div>'
      + '<p>ツールバーから HTML / PNG / PDF / PPTX として保存できます。</p>'
      + '<div class="note"><p><strong>注意点</strong></p><ul>'
      + '<li>HTML中に <code>#</code> を含める場合のみ <code>%23</code> に置換（その他はブラウザが自動エンコード）</li>'
      + '<li>URL長は数十KBが実用上限（Chrome 約 32KB / Firefox 64KB / Safari 約 80KB）。これを超える場合は上の貼付欄から短縮URL化できます。</li>'
      + '<li>PNG / PDF / PPTX は外部ライブラリ（html2canvas, jsPDF, pptxgenjs, JSZip）をCDN経由で読み込みます</li>'
      + '<li>スライド構造を検出した場合 PNGはZIP · PDF/PPTXは多ページとして出力</li>'
      + '</ul></div>'
      + '<script>(function(){'
      + 'var btn=document.getElementById("paste-submit");'
      + 'var input=document.getElementById("paste-input");'
      + 'var msg=document.getElementById("paste-msg");'
      + 'function setMsg(t,c){msg.textContent=t||"";msg.className=c||"";}'
      + 'async function submit(){'
        + 'setMsg("");'
        + 'var v=input.value;'
        + 'if(!v||!v.trim()){setMsg("入力が空です","err");return;}'
        + 'btn.disabled=true;var orig=btn.textContent;btn.textContent="処理中...";'
        + 'try{'
          + 'if(!parent||typeof parent.uatProcessPaste!=="function"){throw new Error("ページの初期化が完了していません");}'
          + 'await parent.uatProcessPaste(v);'
        + '}catch(e){'
          + 'setMsg((e&&e.message)||String(e),"err");'
          + 'btn.disabled=false;btn.textContent=orig;'
        + '}'
      + '}'
      + 'btn.addEventListener("click",submit);'
      + 'input.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){e.preventDefault();submit();}});'
      + '})();<\/script>'
      + '</body>';
  };

  /**
   * location.hash の生文字列をHTMLとして復元する。
   * AIやユーザーにエンコードを要求しない設計のため、以下のフォールバックで「とにかく表示を試みる」：
   *   1. decodeURIComponent でデコード（ブラウザが自動エンコードした日本語・空白等を復元）
   *   2. 失敗したら、孤立した % のみ %25 にエスケープして再デコード
   *      （CSSの width:100%; のような生 % を救う）
   *   3. それも失敗したら、生文字列をそのまま返す
   */
  const decodeHashHtml = (raw) => {
    if (!raw) return '';
    try {
      return decodeURIComponent(raw);
    } catch (e) {
      try {
        const safeRaw = raw.replace(/%(?![0-9A-Fa-f]{2})/g, '%25');
        return decodeURIComponent(safeRaw);
      } catch (e2) {
        return raw;
      }
    }
  };

  // ============================================================
  // 内部アンカー (TOC リンク) の親ナビゲーション抑止
  //   AI 生成アーティファクトの目次が <a href="#math"> のようなフラグメントリンクを
  //   <base target="_top"> や parent.location 経由で親ウィンドウに伝播させてしまうと、
  //   ビューアは "math" を新しい HTML として解釈してしまう。これを防ぐため、
  //     (1) iframe 内 click を capture phase で横取りして preventDefault し、iframe 内
  //         scrollIntoView に振り替える (Layer 1)、
  //     (2) それでも親 hash が書き換わってしまった場合は、iframe 内に該当 id を持つ要素が
  //         存在する短い hash を「アンカークリックの副作用」とみなして再描画せず URL を戻す
  //         (Layer 2)、
  //   の二段構えで防御する。Layer 2 は実在 id 判定を伴うため、新しいアーティファクトを
  //   ハッシュ経由で開く通常用途は妨げない。
  // ============================================================

  /** 直近で描画したコンテンツの hash 文字列（# を除いた raw 値）。Layer 2 のアンカー判定に使う */
  let lastContentHash = '';

  /**
   * hash がアンカークリック由来っぽいかを判定する。判断材料：
   *   - 圧縮 URL (`b=...` 等) ではない
   *   - 長すぎない（150文字以下）
   *   - 既にコンテンツが表示されている (currentHtml 非空)
   *   - iframe 内に decodeURIComponent(hash) と同じ id を持つ要素が実在する
   *  全てを満たすときのみ true を返すため、誤検出（実コンテンツをアンカーと誤認）が起きにくい。
   */
  const isAnchorLikeHash = (h) => {
    if (!h) return false;
    if (h.length > 150) return false;
    if (SHORT_URL_HASH_RE.test(h)) return false;
    if (!currentHtml) return false;
    const idoc = frame.contentDocument;
    if (!idoc) return false;
    try {
      const decoded = decodeURIComponent(h);
      return !!idoc.getElementById(decoded);
    } catch (e) {
      return false;
    }
  };

  /**
   * iframe 内 click を capture phase で横取りし、フラグメントリンク `<a href="#...">` の
   * 既定動作を抑止して iframe 内 scrollIntoView に振り替える。
   * `<base target="_top">` 等で親ウィンドウへ伝播する設定でも preventDefault でナビゲーション
   * ごと止められる。修飾キー付きクリック・中クリックはブラウザ既定 (新規タブ等) に任せる。
   */
  const attachAnchorInterceptor = () => {
    const idoc = frame.contentDocument;
    if (!idoc) return;
    idoc.addEventListener('click', (e) => {
      if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      const a = e.target && e.target.closest && e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.charAt(0) !== '#') return;
      // 既定動作（ナビゲーション）のみ抑止する。stopPropagation は呼ばない —
      // アーティファクト独自の click ハンドラ (ハイライト切替、ログ収集、タブ切り替え等)
      // を妨げないため。preventDefault だけでフラグメントナビゲーションは確実に止まる。
      e.preventDefault();
      const id = href.slice(1);
      const iwin = frame.contentWindow || idoc.defaultView;
      if (!id) {
        try { if (iwin) iwin.scrollTo(0, 0); } catch (err) {}
        return;
      }
      try {
        const decoded = decodeURIComponent(id);
        const target = idoc.getElementById(decoded);
        if (target && typeof target.scrollIntoView === 'function') {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      } catch (err) { /* ignore */ }
    }, true);
  };

  // hashchange の連続発火に備えて、render の最新世代だけが描画を反映するようにする
  let renderSeq = 0;
  /** location.hash からHTMLを取り出してフレームに反映（`#z=...` は gzip 圧縮されたペイロード） */
  const render = async () => {
    // %23 リカバリ: メーラー / チャット / フォーラム等が URL 中の `#` を `%23` に
    // エスケープしてしまったケースを救済する。`location.hash` は空でも、URL 文字列中に
    // `%23` があり、その後ろが「短縮URL形式」または「HTML らしき文字列」であれば、本来の
    // フラグメント区切りとみなして history.replaceState で `#` 付きの URL に直してから
    // 描画フローに入る。クエリパラメータ値に偶然 %23 が紛れたケース (例: ?token=abc%23def)
    // で誤動作しないよう、復元先の中身を「短縮URL or HTMLらしさ」でパターン判定する。
    // この処理はペースト経由 (uatProcessPaste) の %23 救済とは別経路: アドレスバー直接訪問時に
    // ペースト UI を経由せず即描画させるためのもの。
    if (!location.hash) {
      const hrefStr = location.href;
      const pctIdx = hrefStr.search(/%23/i);
      if (pctIdx >= 0) {
        const recovered = hrefStr.slice(pctIdx + 3);
        const looksLikeShortUrl = SHORT_URL_HASH_RE.test(recovered);
        // `<` 直開始 (生HTML) または `%3C` (URLエンコード済み HTML) を判定。`%3c` 小文字も許容。
        const looksLikeHtml = /^(<|%3[Cc])/.test(recovered);
        if (looksLikeShortUrl || looksLikeHtml) {
          try {
            history.replaceState(null, '', hrefStr.slice(0, pctIdx) + '#' + recovered);
          } catch (e) {
            // recovered に replaceState が拒否する制御文字等が含まれていた場合のフォールバック。
            // 失敗時は何もせず通常の empty state 表示に進む (致命ではない)。
            console.warn('[url-to-artifact] %23 -> # recovery failed:', e);
          }
        }
      }
    }
    const mySeq = ++renderSeq;
    const raw = location.hash.slice(1);
    if (!raw) {
      if (mySeq !== renderSeq) return;
      currentHtml = '';
      titleEl.textContent = 'Artifact Viewer';
      document.title = 'Artifact Viewer';
      frame.srcdoc = renderEmptyState();
      setStatus('');
      lastContentHash = '';
      setBusy(false);
      return;
    }
    let html;
    // `#<prefix>=<base64url>` は圧縮されたHTML（Copy Short URL で生成）。
    //   小文字 (v1, 辞書なし): s=zstd / b=Brotli / d=deflate-raw / z=gzip / l=LZMA
    //   大文字 (v2, 辞書あり): S/B/D/Z/L  ← 展開後に A-3 辞書を逆処理する
    const compressedMatch = raw.match(SHORT_URL_HASH_RE);
    if (compressedMatch) {
      const customDictVersion = compressedMatch[1] ? parseInt(compressedMatch[1], 10) : 0;
      const prefixChar = compressedMatch[2];
      const fmt = FORMAT_BY_PREFIX[prefixChar];
      const dictApplied = (prefixChar === prefixChar.toUpperCase());
      const payload = compressedMatch[3];
      // LZMA は CDN ロード後に常に動く前提。CompressionStream 系のみブラウザ非対応の可能性がある。
      const isStreamFmt = (fmt !== 'lzma');
      const hasFallbackDecompress = (fmt === 'brotli');
      if (isStreamFmt && !hasFallbackDecompress && (!compressionSupported || !decompressSupport[fmt])) {
        if (mySeq !== renderSeq) return;
        const reasons = {
          brotli: 'this URL uses Brotli; please open in Chrome 144+ / Firefox 147+ / Safari 19+',
          zstd: 'this URL uses zstd; please open in a browser whose CompressionStream API supports zstd (currently Firefox 149+)',
          'deflate-raw': 'this URL uses deflate-raw; please use a modern browser',
          gzip: 'compressed payload requires a modern browser (CompressionStream)'
        };
        // currentHtml と タイトルを空状態に揃える。これをしないと「古いアーティファクトが
        // currentHtml に残ったまま PNG / PDF / PPTX エクスポートボタンが有効化され、空の empty state を
        // キャプチャしてしまう」事故が起きる。lastContentHash も現 URL に揃え、同一 hash の
        // hashchange が再びエラー処理を走らせないようにする。
        currentHtml = '';
        titleEl.textContent = 'Artifact Viewer';
        document.title = 'Artifact Viewer';
        setStatus(reasons[fmt] || ('this URL uses ' + fmt + '; not supported on this browser'));
        frame.srcdoc = renderEmptyState();
        lastContentHash = raw;
        setBusy(false);
        return;
      }
      const dtags = [fmt];
      if (dictApplied) dtags.push('A3');
      if (customDictVersion === 6) dtags.push('dyn-v6');
      else if (customDictVersion === 7) dtags.push('sdht-v7');
      else if (customDictVersion > 0) dtags.push('dict-v' + customDictVersion);
      setStatus('decompressing (' + dtags.join('+') + ')...');
      try {
        html = await decompressHtml(fmt, payload, dictApplied, customDictVersion);
      } catch (e) {
        if (mySeq !== renderSeq) return;
        setStatus('decompress failed: ' + (e && e.message ? e.message : e));
        // 壊れたペイロードを raw 文字列として iframe に流し込むと 3 重不具合が連鎖していた:
        //   (a) エラー status が直後の setStatus(formatBytes(html.length)) で上書きされ見えなくなる
        //   (b) currentHtml に 'b=ABCDEF...' 等の意味のない文字列が入り、PNG/PDF/PPTX エクスポート
        //       ボタンが有効化されてゴミデータの保存ができてしまう
        //   (c) lastContentHash が更新されず、同じハッシュで hashchange が再発火した際に anchor 検出が誤動作
        // 空状態 + エラー status を保持して早期リターンし、上記 3 件を一括で防ぐ。
        currentHtml = '';
        titleEl.textContent = 'Artifact Viewer';
        document.title = 'Artifact Viewer';
        frame.srcdoc = renderEmptyState();
        lastContentHash = raw;
        setBusy(false);
        return;
      }
    } else {
      html = decodeHashHtml(raw);
    }
    if (mySeq !== renderSeq) return;
    currentHtml = html;
    const ttl = extractTitle(html) || 'Artifact';
    titleEl.textContent = ttl;
    // ブラウザタブにも反映（複数タブで区別しやすくする）
    document.title = ttl + ' — Artifact Viewer';
    frame.srcdoc = html;
    // html.length は UTF-16 コードユニット数なので多バイト文字では少なめに出るが、
    // Blob 生成でトラブルが起きていたためシンプルなコードユニット数に戻す。
    setStatus(formatBytes(html.length));
    lastContentHash = raw;
    setBusy(false);
  };

  // ============================================================
  // Copy URL / Copy Short URL
  // ============================================================
  const copyUrl = async () => {
    try {
      await navigator.clipboard.writeText(location.href);
      setStatus('URL copied');
    } catch (e) {
      setStatus('clipboard failed: ' + (e && e.message ? e.message : e));
    }
  };

  const copyShortUrl = async () => {
    if (!currentHtml) return;
    setBusy(true);
    setStatus('compressing...');
    try {
      const result = await compressHtml(currentHtml);
      const hash = '#' + result.prefix + '=' + result.payload;
      const url = location.origin + location.pathname + hash;
      await navigator.clipboard.writeText(url);
      const tags = [result.format];
      if (result.dict) tags.push('A3');
      if (result.customDictVersion === 6) tags.push('dyn-v6');
      else if (result.customDictVersion === 7) tags.push('sdht-v7');
      else if (result.customDictVersion > 0) tags.push('dict-v' + result.customDictVersion);
      // 圧縮効果の可視化: 元 HTML のバイトサイズ、短縮 URL のバイトサイズ、
      // そして「パーセンテージ何%圧縮されたか」を status に表示する。
      // currentHtml.length は UTF-16 code unit 数なので多バイト文字では実際のバイト数と
      // ずれる。Blob でサイズを取ると UTF-8 エンコード後のバイト数が取れるので、
      // ユーザーが「ファイルの大きさ」として認識している数値と一致しやすい。
      const beforeBytes = new Blob([currentHtml]).size;
      const afterBytes = new Blob([url]).size;
      const savedPct = beforeBytes > 0 ? ((1 - afterBytes / beforeBytes) * 100) : 0;
      const sign = savedPct >= 0 ? '-' : '+';
      setStatus('short URL copied (' + tags.join('+') + ', '
        + formatBytes(beforeBytes) + ' → ' + formatBytes(afterBytes)
        + ', ' + sign + Math.abs(savedPct).toFixed(1) + '%)');
    } catch (e) {
      setStatus('shorten failed: ' + (e && e.message ? e.message : e));
    } finally {
      setBusy(false);
    }
  };

  // ============================================================
  // Event wiring & init
  // ============================================================
  frame.addEventListener('load', () => attachAnchorInterceptor());

  window.addEventListener('hashchange', () => {
    const newHash = location.hash.slice(1);
    if (newHash === lastContentHash) return;
    if (isAnchorLikeHash(newHash)) {
      // アンカークリックの副作用と判定 → URL を戻して再描画はしない
      try { history.replaceState(null, '', '#' + lastContentHash); } catch (e) {}
      return;
    }
    render();
  });

  exportBtns.forEach(btn => {
    btn.addEventListener('click', async () => {
      const fmt = btn.dataset.export;
      if (!exporters[fmt] || !currentHtml) return;
      setBusy(true);
      try {
        await exporters[fmt]();
      } catch (e) {
        setStatus('export failed: ' + (e && e.message ? e.message : e));
      } finally {
        setBusy(false);
      }
    });
  });

  copyBtn.addEventListener('click', copyUrl);
  shortenBtn.addEventListener('click', copyShortUrl);

  // 初回描画。エラーは status に表示。
  render().catch(e => setStatus('init failed: ' + (e && e.message ? e.message : e)));

  // CDN 系のプリロード（失敗は無視）
  loadScript(URLS.lzma).catch(() => {});
  loadBrotliWasm().catch(() => {});
})();
</script>
</body>
</html>
